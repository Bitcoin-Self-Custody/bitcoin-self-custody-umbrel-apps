manifestVersion: 1
id: btcsc-simplejadepinserver
name: SimpleJadePinServer
category: bitcoin
version: "1.0.0"
tagline: Self-hosted blind PIN oracle for Blockstream Jade
icon: https://raw.githubusercontent.com/Bitcoin-Self-Custody/SimpleJadePinServer.Blazor/main/docs/icon.svg
description: >-
  A self-hosted blind PIN oracle for the Blockstream Jade hardware wallet,
  with support for QR Pin Unlock (air-gapped operation).
  This is a C# / Blazor Server port of SimpleJadePinServer by Filiprogrammer.
  It reimplements the same blind oracle protocol using NBitcoin, verified
  against wallycore test vectors for compatibility.
  Once configured, your Jade communicates with this server via QR codes
  to securely unlock your wallet without any network connection on the Jade.
releaseNotes: >-
  Initial release with full blind oracle protocol support,
  QR Pin Unlock, and Oracle QR pairing.
developer: Bitcoin-Self-Custody
